server {
    listen       80;
    server_name  kylin-pbc.com;
    rewrite ^/(.*)$ https://$server_name/$1 permanent;
}

server {
    listen       443;
    server_name  kylin-pbc.com;
    ssl                  on;
    ssl_certificate      /var/www/cert/8873002_kylin-pbc.com.pem;
    ssl_certificate_key  /var/www/cert/8873002_kylin-pbc.com.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;
    location / {
        root   /var/www/kylin-qc;
        index  index.html;
    }
}
